<!DOCTYPE html>
<html lang="ja">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FFF4H3EVV8"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-FFF4H3EVV8');</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rollaxy ランキング | NOVORA GAME</title>
  <meta name="description" content="Rollaxy のスコアランキング。全期間・今週・今日のトップスコアを確認できます。">
  <link rel="canonical" href="https://novoragame.com/games/rollaxy/ranking/">
  <link rel="icon" href="/favicon.ico">
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://novoragame.com/games/rollaxy/ranking/">
  <meta property="og:title"       content="Rollaxy ランキング | NOVORA GAME">
  <meta property="og:description" content="Rollaxy のトップスコアランキング。全期間・今週・今日で絞り込み可能。">
  <meta property="og:image"       content="https://novoragame.com/ogp.png">
  <meta name="twitter:card"       content="summary_large_image">
  <link rel="stylesheet" href="/style.css">
  <style>
    /* ── ページ全体 ── */
    .ranking-wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 28px 12px 96px; /* bottom: 固定バー分の余白 */
    }
    .ranking-title {
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      font-weight: 800;
      letter-spacing: 0.06em;
      text-align: center;
      margin-bottom: 24px;
      background: linear-gradient(135deg, #fff 30%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── タブ ── */
    .rank-tabs {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .rank-tab {
      padding: 9px 22px;
      border: 1px solid rgba(124,92,252,0.35);
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      /* タップしやすい最低高さ */
      min-height: 40px;
    }
    .rank-tab:hover {
      background: rgba(124,92,252,0.1);
      color: var(--text);
    }
    .rank-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── 自分のベスト（ヒーローカード） ── */
    .rank-card.is-me-hero {
      background: rgba(62,207,255,0.06);
      border-left: 3px solid var(--accent2);
      border-bottom: 1px solid rgba(62,207,255,0.22);
    }
    .rank-card.is-me-hero:hover { background: rgba(62,207,255,0.11); }
    /* ヒーローカード内の順位列 */
    .rc-rank.me      { color: var(--accent2); }
    .rc-rank.unknown { color: var(--muted); font-size: 0.82rem; }
    /* "あなたのベスト" ラベル（プレイヤー名の位置に表示） */
    .rc-me-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--accent2);
      letter-spacing: 0.05em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      line-height: 1.3;
    }
    /* ヒーローカードのスコアは少し明るく */
    .rank-card.is-me-hero .rc-score { color: #d0e8ff; }

    /* ── カードリスト ── */
    .rank-list {
      display: flex;
      flex-direction: column;
      border-radius: 14px;
      border: 1px solid rgba(124,92,252,0.18);
      overflow: hidden;
    }

    /* 1エントリー = 1カード */
    .rank-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      background: transparent;
      transition: background 0.12s;
      min-height: 62px;
    }
    .rank-card:last-child { border-bottom: none; }
    .rank-card:hover      { background: rgba(255,255,255,0.025); }

    /* 自分のエントリー */
    .rank-card.is-mine {
      background: rgba(124,92,252,0.1);
      border-left: 3px solid var(--accent);
    }
    .rank-card.is-mine:hover { background: rgba(124,92,252,0.15); }

    /* 順位 */
    .rc-rank {
      width: 2.4em;
      text-align: right;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--muted);
      flex-shrink: 0;
      line-height: 1;
    }
    .rc-rank.top1 { color: #ffd700; font-size: 1.05rem; }
    .rc-rank.top2 { color: #c0c0c0; font-size: 1.05rem; }
    .rc-rank.top3 { color: #cd7f32; font-size: 1.05rem; }

    /* 最大天体絵文字 */
    .rc-body {
      font-size: 1.6rem;
      flex-shrink: 0;
      width: 2rem;
      text-align: center;
      line-height: 1;
    }

    /* メイン情報（スコア・プレイヤー名・称号） */
    .rc-main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .rc-score-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex-wrap: wrap;
    }
    /* プレイヤー名（上段・目立つ） */
    .rc-player {
      font-size: 0.95rem;
      font-weight: 700;
      color: #d4baff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      line-height: 1.3;
    }
    .rc-player--anon { color: var(--muted); font-weight: 400; font-size: 0.85rem; }
    .rc-mine-marker  { font-size: 0.8rem; }
    /* スコア（下段） */
    .rc-score {
      font-size: 0.88rem;
      font-weight: 600;
      color: #a090c0;
      white-space: nowrap;
    }
    /* 自分のカードではスコアを少し明るく */
    .rank-card.is-mine .rc-score { color: #c8b0e8; }
    /* .rc-title は削除済み */

    /* 右側：日時 + リンク */
    .rc-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }
    .rc-date {
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
    }
    .rc-link {
      color: var(--accent2);
      text-decoration: none;
      opacity: 0.65;
      font-size: 1rem;
      padding: 4px 2px;
      transition: opacity 0.15s;
    }
    .rc-link:hover { opacity: 1; }

    /* ── ローディング / エラー / 空 ── */
    .rank-status {
      text-align: center;
      padding: 48px 16px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .rank-status.error { color: #ff6666; }

    /* ── 固定下部バー（ゲームに戻る） ── */
    #back-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 10px 16px;
      background: rgba(8, 12, 20, 0.94);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid rgba(124,92,252,0.22);
      display: flex;
      justify-content: center;
      z-index: 200;
    }
    .back-btn {
      display: block;
      width: 100%;
      max-width: 400px;
      padding: 13px 24px;
      border: none;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      border-radius: 10px;
      font-size: 0.97rem;
      font-weight: 700;
      text-decoration: none;
      text-align: center;
      transition: background 0.15s;
    }
    .back-btn:hover  { background: #9970ff; }
    .back-btn:active { background: #6644dd; }

    /* ── スマホ追加調整 ── */
    @media (max-width: 480px) {
      .ranking-wrap { padding-left: 10px; padding-right: 10px; }
      .rank-card    { gap: 10px; padding: 12px 10px; }
      .rc-body      { font-size: 1.35rem; width: 1.8rem; }
      .rc-score     { font-size: 1rem; }
      .rank-tab     { padding: 8px 16px; font-size: 0.85rem; }
      /* 称号列は廃止済み */
    }
  </style>
</head>
<body>

<nav class="site-nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">NOVORA GAME</a>
    <ul class="nav-links">
      <li><a href="/games/" data-i18n="navGames">ゲーム</a></li>
      <li><a href="/games/rollaxy/" data-i18n="navRollaxy" class="active">Rollaxy</a></li>
      <li><a href="/profile/" data-i18n="navProfile">👤 プロフィール</a></li>
    </ul>
    <div id="site-lang-selector"></div>
  </div>
</nav>

<main>
  <div class="ranking-wrap">
    <h1 class="ranking-title" data-i18n="rankingTitle">🏆 Rollaxy ランキング</h1>

    <!-- タブ（全期間 / 今週 / 今日） -->
    <div class="rank-tabs">
      <button class="rank-tab" data-period="all" data-i18n="tabAll">全期間</button>
      <button class="rank-tab" data-period="weekly" data-i18n="tabWeekly">今週</button>
      <button class="rank-tab" data-period="daily" data-i18n="tabDaily">今日</button>
    </div>

    <!-- カードリスト（自分のベストカードはリスト先頭にJSで挿入） -->
    <div class="rank-list" id="rank-list">
      <div class="rank-status" id="rank-status">読み込み中...</div>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="footer-links">
    <a href="/" data-i18n="footerHome">Home</a>
    <a href="/games/" data-i18n="navGames">ゲーム</a>
    <a href="/privacy/" data-i18n="footerPrivacy">プライバシーポリシー</a>
  </div>
  &copy; 2025 NOVORA GAME
</footer>

<!-- 固定下部：ゲームに戻るボタン -->
<div id="back-bar">
  <button class="back-btn" id="back-btn" data-i18n="backToGame">▶ ゲームに戻る</button>
</div>

<script src="/i18n.js"></script>
<script src="/games/rollaxy/game-consts.js"></script>
<script>
'use strict';

// BODY_EMOJIS / getTitle / fmtScore は game-consts.js で定義

function escHtml(str) {
  return str
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(unixSec) {
  return new Date(unixSec * 1000).toLocaleDateString('ja-JP', {
    month: 'numeric', day: 'numeric',
  });
}

// ── localStorage ──
function getMyShareIds() {
  try { return JSON.parse(localStorage.getItem('novora_share_ids') || '[]'); } catch { return []; }
}
function getBestShareId() {
  return localStorage.getItem('novora_best_share_id') || null;
}

// ゲームに戻るボタン
// window.open / target="_blank" で開かれたタブなら window.close() でタブを閉じる。
// 直接URLアクセスの場合 window.close() が無視されるため、200ms 後に /games/rollaxy/ へ遷移する。
document.getElementById('back-btn').addEventListener('click', () => {
  window.close();
  setTimeout(() => { location.href = '/games/rollaxy/'; }, 200);
});

// ── URL state ──
const VALID_PERIODS = ['all', 'weekly', 'daily'];
const params = new URLSearchParams(location.search);
let period = VALID_PERIODS.includes(params.get('period')) ? params.get('period') : 'all';

// ── タブ ──
function renderTabs() {
  document.querySelectorAll('.rank-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.period === period);
  });
}

document.querySelectorAll('.rank-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.dataset.period === period) return;
    period = btn.dataset.period;
    history.pushState({ period }, '', `?period=${period}`);
    renderTabs();
    loadRanking();
  });
});

window.addEventListener('popstate', e => {
  period = e.state?.period || 'all';
  renderTabs();
  loadRanking();
});

// ── ランキング読み込み ──
async function loadRanking() {
  const list = document.getElementById('rank-list');
  const tg = (typeof TG === 'function') ? TG : k => k;
  list.innerHTML = `<div class="rank-status">${tg('rankLoading')}</div>`;

  const myIds     = getMyShareIds();
  const bestId    = getBestShareId();
  const bestScore = Number(localStorage.getItem('novora_best_score') || 0);
  const scoreUnit = tg('scoreUnit') || '点';

  // tz: -(getTimezoneOffset()) でUTC+分数に変換（getTimezoneOffset は符号が逆）
  const _tz = -(new Date().getTimezoneOffset());
  let entries;
  try {
    const res = await fetch(`/api/rollaxy/ranking?period=${period}&limit=100&tz=${_tz}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    entries = data.entries || [];
  } catch {
    list.innerHTML = `<div class="rank-status error">${tg('rankError')}</div>`;
    return;
  }

  // 自分のベストエントリーを結果から探す
  let bestEntry = null;
  for (const e of entries) {
    if (e.id === bestId) { bestEntry = e; break; }
  }

  const cards = [];

  // ── 自分のベスト（ヒーローカード）──
  if (bestScore > 0) {
    const rankStr   = bestEntry ? `#${bestEntry.rank}` : '?';
    const rankClass = bestEntry
      ? (bestEntry.rank === 1 ? 'top1' : bestEntry.rank === 2 ? 'top2' : bestEntry.rank === 3 ? 'top3' : 'me')
      : 'unknown';
    const emoji     = bestEntry ? BODY_EMOJIS[Math.min(11, bestEntry.highest_body_tier)] : '✨';
    const linkHtml  = bestId
      ? `<a class="rc-link" href="/games/rollaxy/share/${bestId}" target="_blank" rel="noopener" aria-label="share">🔗</a>`
      : '';
    cards.push(`<div class="rank-card is-me-hero">
  <div class="rc-rank ${rankClass}">${rankStr}</div>
  <div class="rc-body" aria-hidden="true">${emoji}</div>
  <div class="rc-main">
    <div class="rc-player rc-me-label">${tg('myBestLabel')}</div>
    <div class="rc-score">${fmtScore(bestScore)}${scoreUnit}</div>
  </div>
  <div class="rc-meta">${linkHtml}</div>
</div>`);
  }

  // ── 通常ランキングカード ──
  if (entries.length === 0) {
    const pad = bestScore > 0 ? ' style="padding-top:28px;padding-bottom:28px"' : '';
    cards.push(`<div class="rank-status"${pad}>${tg('rankEmpty')}</div>`);
  } else {
    for (const entry of entries) {
      const isMine    = myIds.includes(entry.id);
      const rankClass = entry.rank === 1 ? 'top1' : entry.rank === 2 ? 'top2' : entry.rank === 3 ? 'top3' : '';
      const emoji     = BODY_EMOJIS[Math.min(11, entry.highest_body_tier)];
      const shareHref = `/games/rollaxy/share/${entry.id}`;
      const mineMarker  = isMine ? ' <span class="rc-mine-marker">👤</span>' : '';
      const playerStr   = entry.display_name
        ? `<div class="rc-player">${escHtml(entry.display_name)}${mineMarker}</div>`
        : `<div class="rc-player rc-player--anon">—${mineMarker}</div>`;
      cards.push(`<div class="rank-card${isMine ? ' is-mine' : ''}">
  <div class="rc-rank ${rankClass}">#${entry.rank}</div>
  <div class="rc-body" aria-hidden="true">${emoji}</div>
  <div class="rc-main">
    ${playerStr}
    <div class="rc-score">${fmtScore(entry.score)}${scoreUnit}</div>
  </div>
  <div class="rc-meta">
    <span class="rc-date">${fmtDate(entry.created_at)}</span>
    <a class="rc-link" href="${shareHref}" target="_blank" rel="noopener" aria-label="share">🔗</a>
  </div>
</div>`);
    }
  }

  if (cards.length === 0) {
    list.innerHTML = `<div class="rank-status">${tg('rankEmpty')}</div>`;
  } else {
    list.innerHTML = cards.join('');
  }
}

// ── 言語変更時に再描画 ──
document.addEventListener('globalLangChange', () => {
  loadRanking();
});

// ── 初期化 ──
renderTabs();
loadRanking();

// ranking_open イベント（ページ読み込み時に一度だけ送信）
// タブ切り替えや言語変更による loadRanking() 再呼び出しでは送信しない
gtag('event', 'ranking_open', {
  game_id: 'rollaxy',
  period,  // URL パラメータから取得した初期タブ
});
</script>

</body>
</html>
