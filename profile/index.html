<!DOCTYPE html>
<html lang="ja">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FFF4H3EVV8"></script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プロフィール設定 | NOVORA GAME</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/style.css">
  <style>
    .profile-wrap {
      max-width: 560px;
      margin: 0 auto;
      /* bottom: 固定バーの高さ(約62px)＋余裕分 */
      padding: 32px 16px 80px;
    }
    .profile-title {
      font-size: clamp(1.4rem, 5vw, 2rem);
      font-weight: 800;
      margin-bottom: 32px;
      text-align: center;
    }

    /* ── カードセクション ── */
    .prof-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 24px 20px;
      margin-bottom: 20px;
    }
    .prof-card-title {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    /* ── 表示名エディタ ── */
    .dn-row {
      display: flex;
      gap: 10px;
      margin-bottom: 8px;
    }
    .dn-input {
      flex: 1;
      padding: 10px 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(124,92,252,0.4);
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      outline: none;
      min-width: 0;
    }
    .dn-input:focus {
      border-color: var(--accent);
      background: rgba(255,255,255,0.1);
    }
    .dn-save {
      padding: 10px 20px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .dn-save:hover { background: #9970ff; }
    .dn-status {
      font-size: 0.82rem;
      min-height: 18px;
      margin-top: 4px;
    }
    .dn-status.ok  { color: #66dd88; }
    .dn-status.err { color: #ff7777; }
    .dn-hint {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 8px;
    }

    /* ── ゲストコード ── */
    .gc-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 12px 14px;
    }
    .gc-code {
      font-family: 'Courier New', monospace;
      font-size: 0.95rem;
      color: #aa88cc;
      letter-spacing: 0.05em;
      flex: 1;
      word-break: break-all;
    }
    .gc-copy {
      padding: 6px 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      color: var(--muted);
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    .gc-copy:hover { background: rgba(255,255,255,0.14); color: var(--text); }
    .gc-note {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 10px;
      line-height: 1.6;
    }

    /* ── ベストスコア ── */
    .best-score-val {
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
    }
    .best-score-link {
      display: inline-block;
      margin-top: 8px;
      padding: 7px 18px;
      background: rgba(124,92,252,0.2);
      border: 1px solid rgba(124,92,252,0.4);
      border-radius: 8px;
      color: #cc99ff;
      text-decoration: none;
      font-size: 0.85rem;
      transition: background 0.15s;
    }
    .best-score-link:hover { background: rgba(124,92,252,0.35); }
    .no-data { color: var(--muted); font-size: 0.9rem; }

    /* ── 最近のシェア ── */
    .recent-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .recent-share-link {
      display: block;
      padding: 8px 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      color: var(--accent2);
      text-decoration: none;
      font-size: 0.85rem;
      font-family: monospace;
      transition: background 0.15s;
    }
    .recent-share-link:hover { background: rgba(255,255,255,0.08); }

    /* ── CTAボタン群 ── */
    .profile-ctas {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 8px;
    }
    .cta-primary {
      padding: 12px 32px;
      background: var(--accent);
      color: #fff;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      text-decoration: none;
      transition: background 0.15s;
    }
    .cta-primary:hover { background: #9970ff; }
    .cta-secondary {
      padding: 12px 24px;
      background: rgba(62,207,255,0.12);
      border: 1px solid rgba(62,207,255,0.35);
      color: var(--accent2);
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s;
    }
    .cta-secondary:hover { background: rgba(62,207,255,0.22); }

    /* ── 固定下部バー（ゲームに戻る） ── */
    #back-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 10px 16px;
      background: rgba(8, 12, 20, 0.94);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid rgba(124,92,252,0.22);
      display: flex;
      justify-content: center;
      z-index: 200;
    }
    .back-btn {
      display: block;
      width: 100%;
      max-width: 400px;
      padding: 13px 24px;
      background: var(--accent);
      color: #fff;
      border-radius: 10px;
      font-size: 0.97rem;
      font-weight: 700;
      text-decoration: none;
      text-align: center;
      transition: background 0.15s;
    }
    .back-btn:hover  { background: #9970ff; }
    .back-btn:active { background: #6644dd; }
  </style>
</head>
<body>

<nav class="site-nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">NOVORA GAME</a>
    <ul class="nav-links">
      <li><a href="/games/" data-i18n="navGames">ゲーム</a></li>
      <li><a href="/games/rollaxy/" data-i18n="navRollaxy">Rollaxy</a></li>
      <li><a href="/games/rollaxy/ranking/" data-i18n="navRanking">ランキング</a></li>
    </ul>
    <div id="site-lang-selector"></div>
  </div>
</nav>

<main>
  <div class="profile-wrap">
    <h1 class="profile-title" data-i18n="profileTitle">👤 プロフィール設定</h1>

    <!-- 表示名 -->
    <div class="prof-card">
      <div class="prof-card-title" data-i18n="profileNameCard">表示名</div>
      <div class="dn-row">
        <input class="dn-input" id="dn-input" type="text" maxlength="15"
               data-i18n-ph="profileNamePh"
               placeholder="15文字以内（日本語OK）" autocomplete="off">
        <button class="dn-save" id="dn-save" data-i18n="profileNameSave">保存</button>
      </div>
      <div class="dn-status" id="dn-status"></div>
      <div class="dn-hint" data-i18n="profileNameHint">ランキングに表示される名前です。日本語・英数字など15文字以内で設定できます。</div>
    </div>

    <!-- ゲストコード -->
    <div class="prof-card">
      <div class="prof-card-title" data-i18n="profileCodeCard">ゲストコード（識別ID）</div>
      <div class="gc-box">
        <span class="gc-code" id="gc-code">—</span>
        <button class="gc-copy" id="gc-copy" data-i18n="profileCopyBtn">コピー</button>
      </div>
      <p class="gc-note" data-i18n="profileCodeNote">
        このコードはブラウザに紐付いた識別子です。同じブラウザで遊ぶ限り同じコードが使われます。異なるブラウザ・デバイスでは別のコードが発行されます。
      </p>
    </div>

    <!-- Rollaxy ベストスコア -->
    <div class="prof-card">
      <div class="prof-card-title" data-i18n="profileBestCard">Rollaxy ベストスコア</div>
      <div id="best-section">
        <div class="best-score-val" id="best-score-val">—</div>
        <a class="best-score-link" id="best-score-link" href="#" style="display:none" data-i18n="profileBestLink">🔗 シェアページを見る</a>
      </div>
    </div>

    <!-- 最近のプレイ -->
    <div class="prof-card">
      <div class="prof-card-title" data-i18n="profileRecentCard">最近のプレイ記録</div>
      <div id="recent-wrap" class="recent-list"></div>
    </div>

    <!-- CTA -->
    <div class="profile-ctas">
      <a class="cta-primary" href="/games/rollaxy/" data-i18n="profilePlayBtn">▶ Rollaxy をプレイ</a>
      <a class="cta-secondary" href="/games/rollaxy/ranking/" data-i18n="profileRankBtn">🏆 ランキング</a>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="footer-links">
    <a href="/" data-i18n="footerHome">Home</a>
    <a href="/games/" data-i18n="navGames">ゲーム</a>
    <a href="/privacy/" data-i18n="footerPrivacy">プライバシーポリシー</a>
  </div>
  &copy; 2025 NOVORA GAME
</footer>

<!-- 固定下部：ゲームに戻るボタン -->
<div id="back-bar">
  <a href="/games/rollaxy/" class="back-btn" id="back-btn" data-i18n="profileBackBtn">▶ ゲームに戻る</a>
</div>

<script src="/i18n.js"></script>
<script>
// ゲームに戻るボタンは常に /games/rollaxy/ へ直接遷移（history.back は使わない）
</script>

<script>
'use strict';

// ── localStorage ヘルパー ──
const ID_CHARS = 'abcdefghijklmnopqrstuvwxyz0123456789';

function ensurePlayerId() {
  let id = localStorage.getItem('novora_player_id');
  if (!id) {
    const rand = Array.from(crypto.getRandomValues(new Uint8Array(12)),
      b => ID_CHARS[b % ID_CHARS.length]).join('');
    id = `guest_${rand}`;
    localStorage.setItem('novora_player_id', id);
  }
  return id;
}

function getGuestCode() {
  const pid = ensurePlayerId();
  return pid.includes('_') ? pid.split('_').slice(1).join('') : pid;
}

function ensureDisplayName() {
  let name = localStorage.getItem('novora_display_name');
  if (!name) {
    const code = getGuestCode();
    name = 'ゲスト_' + code.slice(0, 6);
    localStorage.setItem('novora_display_name', name);
  }
  return name;
}

function saveDisplayName(raw) {
  const name = raw.replace(/[<>"&]/g, '').trim().slice(0, 15);
  if (name.length === 0) return false;
  localStorage.setItem('novora_display_name', name);
  return true;
}

function fmtScore(n) {
  return String(n).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

// ── DOM 初期化 ──
const dnInput  = document.getElementById('dn-input');
const dnSave   = document.getElementById('dn-save');
const dnStatus = document.getElementById('dn-status');
const gcCode   = document.getElementById('gc-code');
const gcCopy   = document.getElementById('gc-copy');

// i18n ヘルパー（i18n.js が先に読まれていれば TG() が使える）
const _tg = (key, fallback) => (typeof TG === 'function' ? TG(key) : fallback);

// 表示名
dnInput.value = ensureDisplayName();
dnSave.addEventListener('click', () => {
  if (saveDisplayName(dnInput.value)) {
    dnInput.value        = localStorage.getItem('novora_display_name');
    dnStatus.textContent = _tg('profileNameSaved', '✓ 保存しました');
    dnStatus.className   = 'dn-status ok';
    setTimeout(() => { dnStatus.textContent = ''; dnStatus.className = 'dn-status'; }, 2500);
    // players テーブルへ即時同期（ゲームプレイなしでも名前変更を反映）
    fetch('/api/rollaxy/player', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        player_id:    ensurePlayerId(),
        display_name: localStorage.getItem('novora_display_name'),
      }),
    }).catch(() => {});
  } else {
    dnStatus.textContent = _tg('profileNameEmpty', '1文字以上入力してください');
    dnStatus.className   = 'dn-status err';
  }
});
dnInput.addEventListener('keydown', e => { if (e.key === 'Enter') dnSave.click(); });

// ゲストコード
const code = getGuestCode();
gcCode.textContent = code;
gcCopy.addEventListener('click', () => {
  navigator.clipboard.writeText(code).then(() => {
    gcCopy.textContent = _tg('profileCopied', '✓ コピー済み');
    setTimeout(() => { gcCopy.textContent = _tg('profileCopyBtn', 'コピー'); }, 2000);
  }).catch(() => {
    // clipboard API 非対応時は選択状態にする
    const range = document.createRange();
    range.selectNode(gcCode);
    window.getSelection()?.removeAllRanges();
    window.getSelection()?.addRange(range);
  });
});

// ベストスコア
function renderBestScore() {
  const best     = Number(localStorage.getItem('novora_best_score') || 0);
  const bestId   = localStorage.getItem('novora_best_share_id');
  const bestEl   = document.getElementById('best-score-val');
  const bestLink = document.getElementById('best-score-link');
  const scoreUnit = _tg('scoreUnit', '点');
  if (best > 0) {
    bestEl.textContent = fmtScore(best) + scoreUnit;
    bestEl.style.fontSize = '';
    bestEl.style.color = '';
    if (bestId) {
      bestLink.href = `/games/rollaxy/share/${bestId}`;
      bestLink.style.display = '';
    }
  } else {
    bestEl.textContent = _tg('profileNoData', 'まだ記録がありません');
    bestEl.style.fontSize = '1rem';
    bestEl.style.color = 'var(--muted)';
    bestLink.style.display = 'none';
  }
}
renderBestScore();

// 最近のシェア（最新5件）
function renderRecentShares() {
  const shareIds  = (() => { try { return JSON.parse(localStorage.getItem('novora_share_ids') || '[]'); } catch { return []; } })();
  const recentWrap = document.getElementById('recent-wrap');
  recentWrap.innerHTML = '';
  if (shareIds.length > 0) {
    [...shareIds].reverse().slice(0, 5).forEach(id => {
      const a   = document.createElement('a');
      a.href    = `/games/rollaxy/share/${id}`;
      a.target  = '_blank';
      a.rel     = 'noopener';
      a.className = 'recent-share-link';
      a.textContent = `🔗 ${id}`;
      recentWrap.appendChild(a);
    });
  } else {
    recentWrap.innerHTML = `<span class="no-data">${_tg('profileNoRecent', 'まだシェア記録がありません')}</span>`;
  }
}
renderRecentShares();

// 言語変更時に再描画
document.addEventListener('globalLangChange', () => {
  renderBestScore();
  renderRecentShares();
});
</script>

</body>
</html>
