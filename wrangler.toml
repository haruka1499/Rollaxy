name = "novora-game"
compatibility_date = "2024-01-01"
main = "src/worker.js"

[assets]
directory = "."

[[d1_databases]]
binding = "DB"
database_name = "novora_game"
database_id = "0bf7131a-ee13-4b51-a05c-691bb44ac0ee"

[[kv_namespaces]]
binding = "RANKING_CACHE"
id = "15af2d0c1ed64b409b10f138f49dd543"

# ADMIN_SECRET は Cloudflare ダッシュボードの Secrets で管理する
# Workers & Pages → novora-game → Settings → Variables → Add variable（Type: Secret）
# キー名: ADMIN_SECRET　値: ランダムな長い文字列（例: openssl rand -hex 32 で生成）
# [vars] に平文で書かない。
