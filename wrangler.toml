name = "novora-game"
compatibility_date = "2024-01-01"
main = "src/worker.js"

[observability.logs]
enabled = true
invocation_logs = true

[assets]
directory = "."
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "novora_game_staging"   # ⚠️ 名前は staging だが実態は本番DB
database_id = "0bf7131a-ee13-4b51-a05c-691bb44ac0ee"
# D1 は database_name をあとから変更する公式手段がないため、この名前のまま運用する。
# コード上のバインド名は "DB" で固定なので動作への影響はない。

[[kv_namespaces]]
binding = "RANKING_CACHE"
id = "15af2d0c1ed64b409b10f138f49dd543"

# Secrets は Cloudflare ダッシュボードで管理する
# Workers & Pages → novora-game → Settings → Variables and Secrets → Add variable（Type: Secret）
# [vars] に平文で書かない。
#
# ADMIN_SECRET : 管理用クリーンアップ API の認証キー（設定済み）
# JWT_SECRET   : セッショントークン署名キー（Phase 2 で追加）
#                設定するまでトークン検証はスキップされる（後方互換）
