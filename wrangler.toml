name = "novora-game"
compatibility_date = "2024-01-01"

# ── Cloudflare Pages プロジェクト設定 ──────────────────────────────
# 動的処理は functions/ ディレクトリの Pages Functions で行う
# D1 / KV バインディングはここで定義（Pages も wrangler.toml を読む）

[[d1_databases]]
binding = "DB"
database_name = "novora_game_staging"
database_id = "0bf7131a-ee13-4b51-a05c-691bb44ac0ee"

[[kv_namespaces]]
binding = "RANKING_CACHE"
id = "15af2d0c1ed64b409b10f138f49dd543"

[vars]
# 管理用エンドポイントの認証シークレット（デプロイ前にランダムな値に変更してください）
ADMIN_SECRET = "REPLACE_WITH_RANDOM_SECRET"
