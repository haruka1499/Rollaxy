<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>天体画像調整ツール</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #060412;
  color: #ccc;
  font-family: sans-serif;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ---- 左リスト ---- */
#body-list {
  width: 170px;
  background: #0c0720;
  border-right: 1px solid #2a1855;
  overflow-y: auto;
  padding: 8px;
  flex-shrink: 0;
}
#body-list h2 { font-size: 11px; color: #666; padding: 4px 4px 8px; letter-spacing: 0.05em; }
.body-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: 6px;
  cursor: pointer;
  margin-bottom: 3px;
  border: 1px solid transparent;
}
.body-item:hover { background: #160b30; }
.body-item.active { background: #1e1040; border-color: #7744bb; }
.body-item .mini-canvas { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; }
.body-item .body-name { font-size: 13px; }
.body-item .body-r { font-size: 10px; color: #555; }

/* ---- 中央プレビュー ---- */
#preview-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  min-width: 0;
}
#preview-canvas {
  border: 1px solid #2a1855;
  border-radius: 8px;
  cursor: grab;
  display: block;
}
#preview-canvas:active { cursor: grabbing; }
#preview-hint {
  font-size: 12px;
  color: #444;
  text-align: center;
  line-height: 1.7;
}

/* ---- 右コントロール ---- */
#controls {
  width: 270px;
  background: #0c0720;
  border-left: 1px solid #2a1855;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  overflow-y: auto;
  flex-shrink: 0;
}
#ctrl-title {
  font-size: 18px;
  font-weight: bold;
  color: #ddd;
  border-bottom: 1px solid #2a1855;
  padding-bottom: 10px;
}
.ctrl-group { display: flex; flex-direction: column; gap: 6px; }
.ctrl-group label { font-size: 11px; color: #888; letter-spacing: 0.05em; }
.ctrl-row { display: flex; align-items: center; gap: 8px; }
.ctrl-row input[type=range] { flex: 1; accent-color: #7744bb; }
.val {
  width: 62px;
  text-align: right;
  font-size: 13px;
  font-family: monospace;
  color: #adf;
  background: #0a0518;
  border: 1px solid #2a1855;
  border-radius: 4px;
  padding: 2px 4px;
  outline: none;
  -moz-appearance: textfield;
}
.val:focus { border-color: #7744bb; }
.val::-webkit-inner-spin-button,
.val::-webkit-outer-spin-button { opacity: 0.4; }

hr.sep { border: none; border-top: 1px solid #1a0e38; }

.btn {
  background: #1a0e38;
  color: #ccc;
  border: 1px solid #3a2260;
  border-radius: 6px;
  padding: 8px 12px;
  cursor: pointer;
  font-size: 13px;
  text-align: center;
  transition: background 0.15s;
}
.btn:hover { background: #2a1855; border-color: #7744bb; }
.btn.primary { border-color: #7744bb; color: #ddf; }

#info-box {
  font-size: 11px;
  color: #555;
  line-height: 1.8;
}

/* ---- 出力エリア ---- */
#output-area {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
#output-area.show { display: flex; }
#output-box {
  background: #0c0720;
  border: 1px solid #7744bb;
  border-radius: 10px;
  padding: 20px;
  width: 680px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
#output-box h3 { color: #ddd; font-size: 15px; }
#output-code {
  background: #060412;
  border: 1px solid #2a1855;
  border-radius: 6px;
  padding: 12px;
  font-family: monospace;
  font-size: 12px;
  color: #8af;
  overflow-y: auto;
  white-space: pre;
  flex: 1;
}
#output-msg {
  font-size: 12px;
  color: #888;
  line-height: 1.6;
}
.output-btns { display: flex; gap: 8px; }
</style>
</head>
<body>

<!-- 左リスト -->
<div id="body-list">
  <h2>BODIES</h2>
</div>

<!-- 中央プレビュー -->
<div id="preview-area">
  <canvas id="preview-canvas" width="420" height="420"></canvas>
  <div id="preview-hint">
    ドラッグ: 画像を移動　／　スクロール: 拡大縮小<br>
    白い破線 = 当たり判定の境界
  </div>
</div>

<!-- 右コントロール -->
<div id="controls">
  <div id="ctrl-title">天体を選択してください</div>

  <div class="ctrl-group">
    <label>SCALE（拡大率）</label>
    <div class="ctrl-row">
      <input type="range" id="ctrl-scale" min="0.1" max="3.0" step="0.01" value="1.0">
      <input type="number" class="val" id="val-scale" min="0.1" max="3.0" step="0.01" value="1.00">
    </div>
  </div>

  <div class="ctrl-group">
    <label>OFFSET X（横位置・ゲーム px）</label>
    <div class="ctrl-row">
      <input type="range" id="ctrl-ox" min="-120" max="120" step="0.1" value="0">
      <input type="number" class="val" id="val-ox" min="-120" max="120" step="0.1" value="0.0">
    </div>
  </div>

  <div class="ctrl-group">
    <label>OFFSET Y（縦位置・ゲーム px）</label>
    <div class="ctrl-row">
      <input type="range" id="ctrl-oy" min="-120" max="120" step="0.1" value="0">
      <input type="number" class="val" id="val-oy" min="-120" max="120" step="0.1" value="0.0">
    </div>
  </div>

  <hr class="sep">

  <button class="btn" id="btn-reset">この天体をリセット</button>
  <button class="btn" id="btn-reset-all">すべてリセット</button>

  <hr class="sep">

  <button class="btn primary" id="btn-output">設定を出力 →</button>

  <hr class="sep">

  <div id="info-box">
    ゲーム内半径: <span id="info-r">-</span> px<br>
    表示倍率: <span id="info-zoom">-</span>x
  </div>
</div>

<!-- 出力モーダル -->
<div id="output-area">
  <div id="output-box">
    <h3>設定コード（game.js に反映する値）</h3>
    <div id="output-code"></div>
    <div id="output-msg">
      この内容を Claude に貼り付けると、game.js に自動で反映します。<br>
      または "コピー" して手動で保存しておくこともできます。
    </div>
    <div class="output-btns">
      <button class="btn primary" id="btn-copy">クリップボードにコピー</button>
      <button class="btn" id="btn-close-output">閉じる</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ================================================================
// 天体定義（config.js と同期させること）
// ================================================================
const BODIES = [
  { n: '宇宙塵',         r:  12, c: '#b0a090' },
  { n: '小惑星',         r:  18, c: '#807060' },
  { n: '月',             r:  25, c: '#d0c8b0' },
  { n: '地球',           r:  33, c: '#3388cc' },
  { n: '木星',           r:  42, c: '#d4a870' },
  { n: '太陽',           r:  51, c: '#ffcc00' },
  { n: '赤色巨星',       r:  61, c: '#cc2200' },
  { n: '白色矮星',       r:  70, c: '#c8d8ff' },
  { n: '中性子星',       r:  79, c: '#2244cc' },
  { n: 'ブラックホール', r:  88, c: '#110022' },
  { n: '銀河',           r:  97, c: '#7744cc' },
  { n: '銀河団',         r: 106, c: '#aa44ff' },
];

const DISPLAY_R = 170; // プレビュー上での固定表示半径 (px)

// 各天体の調整値
const adjusts = BODIES.map(() => ({ scale: 1.0, ox: 0, oy: 0 }));

// 読み込み済み画像
const images = new Array(BODIES.length).fill(null);

let selectedBi = 0;

// ================================================================
// 画像ロード
// ================================================================
BODIES.forEach((b, bi) => {
  const img = new Image();
  img.onload = () => {
    images[bi] = img;
    redrawMini(bi);
    if (bi === selectedBi) redraw();
  };
  img.onerror = () => console.warn('画像なし:', b.n + '.png');
  img.src = `images/${b.n}.png`;
});

// ================================================================
// 左リスト構築
// ================================================================
const listEl = document.getElementById('body-list');

BODIES.forEach((b, bi) => {
  const item = document.createElement('div');
  item.className = 'body-item';

  const mini = document.createElement('canvas');
  mini.className = 'mini-canvas';
  mini.width = 36; mini.height = 36;
  mini.dataset.bi = bi;
  item.appendChild(mini);

  const info = document.createElement('div');
  info.innerHTML = `<div class="body-name">${b.n}</div><div class="body-r">r=${b.r}</div>`;
  item.appendChild(info);

  item.addEventListener('click', () => selectBi(bi));
  listEl.appendChild(item);
});

function redrawMini(bi) {
  const item = listEl.querySelectorAll('.body-item')[bi];
  const mini = item.querySelector('canvas');
  const mctx = mini.getContext('2d');
  const cx = 18, cy = 18, mr = 15;
  const b = BODIES[bi];

  mctx.clearRect(0, 0, 36, 36);
  mctx.beginPath(); mctx.arc(cx, cy, mr, 0, Math.PI * 2);
  mctx.fillStyle = b.c; mctx.fill();

  const img = images[bi];
  if (img) {
    const adj = adjusts[bi];
    const displayScale = mr / b.r;
    const baseScale = Math.max((b.r * 2) / img.naturalWidth, (b.r * 2) / img.naturalHeight);
    const s = baseScale * adj.scale * displayScale;
    const dw = img.naturalWidth * s;
    const dh = img.naturalHeight * s;
    mctx.save();
    mctx.beginPath(); mctx.arc(cx, cy, mr, 0, Math.PI * 2); mctx.clip();
    mctx.drawImage(img, cx + adj.ox * displayScale - dw / 2, cy + adj.oy * displayScale - dh / 2, dw, dh);
    mctx.restore();
  }
}

// ================================================================
// 天体選択
// ================================================================
function selectBi(bi) {
  selectedBi = bi;
  [...listEl.querySelectorAll('.body-item')].forEach((el, i) => el.classList.toggle('active', i === bi));

  const adj = adjusts[bi];
  sliderScale.value = adj.scale;
  sliderOX.value    = adj.ox;
  sliderOY.value    = adj.oy;
  valScale.value = adj.scale.toFixed(2);
  valOX.value    = adj.ox.toFixed(1);
  valOY.value    = adj.oy.toFixed(1);

  document.getElementById('ctrl-title').textContent = BODIES[bi].n;
  document.getElementById('info-r').textContent    = BODIES[bi].r;
  document.getElementById('info-zoom').textContent = (DISPLAY_R / BODIES[bi].r).toFixed(2);
  redraw();
}

// ================================================================
// メインプレビュー描画
// ================================================================
const canvas = document.getElementById('preview-canvas');
const ctx    = canvas.getContext('2d');
const CW = canvas.width, CH = canvas.height;

function redraw() {
  ctx.clearRect(0, 0, CW, CH);
  ctx.fillStyle = '#060412';
  ctx.fillRect(0, 0, CW, CH);

  // グリッド
  ctx.strokeStyle = 'rgba(255,255,255,0.035)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= CW; x += 20) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, CH); ctx.stroke(); }
  for (let y = 0; y <= CH; y += 20) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CW, y); ctx.stroke(); }

  const b   = BODIES[selectedBi];
  const adj = adjusts[selectedBi];
  const cx  = CW / 2, cy = CH / 2;
  const displayScale = DISPLAY_R / b.r;

  // 背景色円
  ctx.beginPath();
  ctx.arc(cx, cy, DISPLAY_R, 0, Math.PI * 2);
  ctx.fillStyle = b.c;
  ctx.fill();

  // 画像
  const img = images[selectedBi];
  if (img) {
    const baseScale = Math.max((b.r * 2) / img.naturalWidth, (b.r * 2) / img.naturalHeight);
    const s  = baseScale * adj.scale * displayScale;
    const dw = img.naturalWidth  * s;
    const dh = img.naturalHeight * s;
    const dx = cx + adj.ox * displayScale - dw / 2;
    const dy = cy + adj.oy * displayScale - dh / 2;

    // 円外: 薄く表示（調整の手がかり用）
    ctx.save();
    ctx.globalAlpha = 0.28;
    ctx.drawImage(img, dx, dy, dw, dh);
    ctx.restore();

    // 円内: 通常表示（クリップして重ねる）
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, DISPLAY_R, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(img, dx, dy, dw, dh);
    ctx.restore();
  }

  // 当たり判定境界（白破線）
  ctx.save();
  ctx.setLineDash([10, 7]);
  ctx.strokeStyle = 'rgba(255,255,255,0.7)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx, cy, DISPLAY_R, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();

  // 中心十字
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1;
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(cx - 12, cy); ctx.lineTo(cx + 12, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, cy - 12); ctx.lineTo(cx, cy + 12); ctx.stroke();
}

// ================================================================
// ドラッグで位置調整
// ================================================================
let dragging = false, dStartX = 0, dStartY = 0, dStartOX = 0, dStartOY = 0;

canvas.addEventListener('mousedown', e => {
  dragging = true;
  dStartX  = e.clientX; dStartY  = e.clientY;
  dStartOX = adjusts[selectedBi].ox;
  dStartOY = adjusts[selectedBi].oy;
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  const displayScale = DISPLAY_R / BODIES[selectedBi].r;
  const nx = Math.round((dStartOX + (e.clientX - dStartX) / displayScale) * 2) / 2;
  const ny = Math.round((dStartOY + (e.clientY - dStartY) / displayScale) * 2) / 2;
  adjusts[selectedBi].ox = nx;
  adjusts[selectedBi].oy = ny;
  sliderOX.value = nx; valOX.value = nx.toFixed(1);
  sliderOY.value = ny; valOY.value = ny.toFixed(1);
  redraw();
  redrawMini(selectedBi);
});
window.addEventListener('mouseup', () => { dragging = false; });

// スクロールでスケール調整
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY < 0 ? 0.02 : -0.02;
  const s = Math.round(Math.max(0.1, Math.min(3.0, adjusts[selectedBi].scale + delta)) * 100) / 100;
  adjusts[selectedBi].scale = s;
  sliderScale.value = s; valScale.value = s.toFixed(2);
  redraw();
  redrawMini(selectedBi);
}, { passive: false });

// ================================================================
// スライダー
// ================================================================
const sliderScale = document.getElementById('ctrl-scale');
const sliderOX    = document.getElementById('ctrl-ox');
const sliderOY    = document.getElementById('ctrl-oy');
const valScale    = document.getElementById('val-scale');
const valOX       = document.getElementById('val-ox');
const valOY       = document.getElementById('val-oy');

function bindSlider(slider, valEl, key, fmt, min, max) {
  // スライダー → 数値欄
  slider.addEventListener('input', () => {
    const v = parseFloat(slider.value);
    adjusts[selectedBi][key] = v;
    valEl.value = fmt(v);
    redraw();
    redrawMini(selectedBi);
  });
  // 数値欄 → スライダー（入力中はリアルタイム反映、Enterや離脱で確定）
  const applyVal = () => {
    let v = parseFloat(valEl.value);
    if (isNaN(v)) return;
    v = Math.max(min, Math.min(max, v));
    adjusts[selectedBi][key] = v;
    slider.value = v;
    valEl.value = fmt(v);
    redraw();
    redrawMini(selectedBi);
  };
  valEl.addEventListener('input', applyVal);
  valEl.addEventListener('change', applyVal);
  valEl.addEventListener('keydown', e => { if (e.key === 'Enter') valEl.blur(); });
}
bindSlider(sliderScale, valScale, 'scale', v => v.toFixed(2), 0.1,  3.0);
bindSlider(sliderOX,    valOX,    'ox',    v => v.toFixed(1), -120, 120);
bindSlider(sliderOY,    valOY,    'oy',    v => v.toFixed(1), -120, 120);

// ================================================================
// リセット
// ================================================================
document.getElementById('btn-reset').addEventListener('click', () => {
  adjusts[selectedBi] = { scale: 1.0, ox: 0, oy: 0 };
  selectBi(selectedBi);
  redrawMini(selectedBi);
});
document.getElementById('btn-reset-all').addEventListener('click', () => {
  adjusts.forEach((_, i) => { adjusts[i] = { scale: 1.0, ox: 0, oy: 0 }; });
  BODIES.forEach((_, bi) => redrawMini(bi));
  selectBi(selectedBi);
});

// ================================================================
// 出力
// ================================================================
function buildCode() {
  const lines = adjusts.map((a, bi) =>
    `  /* ${bi.toString().padStart(2)}: ${BODIES[bi].n.padEnd(7)} */ ` +
    `{ scale: ${a.scale.toFixed(2)}, ox: ${a.ox.toFixed(1).padStart(5)}, oy: ${a.oy.toFixed(1).padStart(5)} },`
  );
  return `const IMG_ADJUST = [\n${lines.join('\n')}\n];`;
}

const outputArea = document.getElementById('output-area');
const outputCode = document.getElementById('output-code');

document.getElementById('btn-output').addEventListener('click', () => {
  outputCode.textContent = buildCode();
  outputArea.classList.add('show');
});
document.getElementById('btn-close-output').addEventListener('click', () => {
  outputArea.classList.remove('show');
});
document.getElementById('btn-copy').addEventListener('click', () => {
  navigator.clipboard.writeText(outputCode.textContent).then(() => {
    const btn = document.getElementById('btn-copy');
    btn.textContent = 'コピーしました！';
    setTimeout(() => { btn.textContent = 'クリップボードにコピー'; }, 2000);
  });
});

// ================================================================
// 初期化
// ================================================================
selectBi(0);
</script>
</body>
</html>
