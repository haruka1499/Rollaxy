<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Debug — ころころ宇宙</title>
  <link rel="stylesheet" href="debug.css">
</head>
<body>

<div id="sidebar">
  <div id="sidebar-title">🛠 Debug</div>

  <div id="palette-label">天体パレット</div>
  <div id="palette"></div>

  <div id="selected-info-box">
    <div id="selected-info">—</div>
  </div>

  <hr class="divider">

  <div id="controls">
    <button id="btn-pause"   class="ctrl-btn">一時停止 [Space]</button>
    <button id="btn-gravity" class="ctrl-btn">重力: ON [G]</button>
    <button id="btn-reset"   class="ctrl-btn danger">全リセット [R]</button>
  </div>

  <hr class="divider">

  <div id="hint">
    <div class="hint-row"><kbd>左クリック</kbd> 配置</div>
    <div class="hint-row"><kbd>左ドラッグ</kbd> 連続配置</div>
    <div class="hint-row"><kbd>右クリック</kbd> 削除</div>
    <div class="hint-row"><kbd>1–9 0 - =</kbd> 天体選択</div>
    <div class="hint-row"><kbd>Space</kbd> 一時停止</div>
    <div class="hint-row"><kbd>G</kbd> 重力切替</div>
    <div class="hint-row"><kbd>R</kbd> 全リセット</div>
  </div>

  <div id="body-count">配置数: <span id="count-val">0</span></div>
</div>

<div id="canvas-wrap">
  <canvas id="dbg-canvas"></canvas>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script src="config.js"></script>
<script src="debug.js"></script>
</body>
</html>
